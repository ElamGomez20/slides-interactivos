backend:
  name: git-gateway
  branch: main

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "contenido"
    label: "Contenido"
    files:
      - name: "configuracion"
        label: "Configuracion general"
        file: "src/data/config.json"
        format: "json"
        fields:
          - label: "Titulo del sitio"
            name: "titulo_sitio"
            widget: "string"
            default: "CMB EL CERRITO"

          - label: "Logo de la iglesia"
            name: "logo"
            widget: "file"
            allow_multiple: false
            hint: "Solo usar imagen .jpg o .png"

          - label: "Contactos de WhatsApp"
            name: "contactos_whatsapp"
            widget: "list"
            min: 4
            max: 4
            fields:
              - label: "ID interno"
                name: "id"
                widget: "select"
                options:
                  - label: "CMB GENERAL"
                    value: "cmb_general"
                  - label: "Escuela Biblica"
                    value: "escuela_biblica"
                  - label: "Obra Social"
                    value: "obra_social"
                  - label: "Jovenes"
                    value: "jovenes"

              - label: "Nombre del area"
                name: "nombre"
                widget: "string"

              - label: "Numero de WhatsApp"
                name: "numero"
                widget: "string"
                hint: "Usar formato internacional sin + ni espacios. Ejemplo: 573185384697"

      - name: "slides"
        label: "Slides de la pagina"
        file: "src/data/slides.json"
        format: "json"
        fields:
          - label: "Slides"
            name: "slides"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "number"
                value_type: "int"
                min: 1

              - label: "Activo"
                name: "activo"
                widget: "boolean"
                default: true

              - label: "Tipo de recurso"
                name: "tipo"
                widget: "select"
                options:
                  - label: "Imagen"
                    value: "imagen"
                  - label: "Video"
                    value: "video"

              - label: "Archivo multimedia"
                name: "url_recurso"
                widget: "file"
                allow_multiple: false
                hint: "Solo usar archivos .jpg, .png o .mp4"

              - label: "Titulo"
                name: "titulo"
                widget: "string"

              - label: "Subtitulo"
                name: "subtitulo"
                widget: "string"

              - label: "Descripcion"
                name: "descripcion"
                widget: "text"

              - label: "Mensaje de WhatsApp"
                name: "mensaje_whatsapp"
                widget: "text"

              - label: "Contacto de WhatsApp"
                name: "contacto_whatsapp"
                widget: "select"
                default: "cmb_general"
                options:
                  - label: "CMB GENERAL"
                    value: "cmb_general"
                  - label: "Escuela Biblica"
                    value: "escuela_biblica"
                  - label: "Obra Social"
                    value: "obra_social"
                  - label: "Jovenes"
                    value: "jovenes"

              - label: "Etiqueta"
                name: "etiqueta"
                widget: "string"